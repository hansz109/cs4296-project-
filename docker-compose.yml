services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "${PROFILE_DB_CPUS:-1.0}"
          memory: "${PROFILE_DB_MEM:-1g}"

  wordpress:
    image: wordpress:6.5.3-php8.2-fpm
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
      WORDPRESS_DB_NAME: wordpress
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - wp_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "${PROFILE_WP_CPUS:-1.0}"
          memory: "${PROFILE_WP_MEM:-2g}"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - wordpress
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - wp_data:/var/www/html:ro
    deploy:
      resources:
        limits:
          cpus: "${PROFILE_NGX_CPUS:-0.5}"
          memory: "${PROFILE_NGX_MEM:-512m}"

volumes:
  db_data:
  wp_data:

